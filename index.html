<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shankar Digital Hub</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
header{background:#0d47a1;color:white;padding:15px;text-align:center;font-size:22px;}

.container{padding:10px;}

.box{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#2ecc71;
  color:white;
  border:none;
}

.admin{
  background:#ff9800;
}

.whatsapp{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#25d366;
  color:white;
  padding:12px;
  border-radius:30px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>🔥 Shankar Digital Hub 🔥</header>

<div class="container">

<!-- LOGIN -->
<div class="box">
<h3>Login / Register</h3>
<input id="user" placeholder="Enter Name">
<button onclick="login()">Login</button>
</div>

<!-- FORM -->
<div class="box">
<h3>Service Request Form</h3>
<input id="name" placeholder="Customer Name">
<input id="service" placeholder="Service (Aadhar / Job etc)">
<button onclick="save()">Submit</button>
</div>

<!-- DATA -->
<div class="box">
<h3>Customer Requests</h3>
<div id="data"></div>
</div>

<!-- ADMIN -->
<div class="box">
<h3>Admin Panel</h3>
<button class="admin" onclick="clearData()">Clear All Data</button>
</div>

</div>

<a class="whatsapp" href="https://wa.me/917467002020">WhatsApp</a>

<script>

// LOGIN
function login(){
let name=document.getElementById("user").value;
localStorage.setItem("user",name);
alert("Welcome "+name);
}

// SAVE FORM
function save(){
let name=document.getElementById("name").value;
let service=document.getElementById("service").value;

let data=JSON.parse(localStorage.getItem("data"))||[];

data.push({name,service});

localStorage.setItem("data",JSON.stringify(data));

load();
}

// LOAD DATA
function load(){
let data=JSON.parse(localStorage.getItem("data"))||[];
let html="";

data.forEach(d=>{
  html+=`<p>👤 ${d.name} → ${d.service}</p>`;
});

document.getElementById("data").innerHTML=html;
}

// CLEAR
function clearData(){
localStorage.removeItem("data");
load();
}

load();

</script>

</body>
</html>
