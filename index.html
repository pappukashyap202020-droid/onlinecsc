<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CSC Digital Portal</title>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  margin:0;
}

header{
  background:linear-gradient(45deg,#0d47a1,#1976d2);
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.search{
  padding:10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* ADS BOX */
.ad-box{
  background:white;
  margin:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:50px;
  margin-bottom:8px;
}

.card a{
  text-decoration:none;
  color:black;
  font-weight:bold;
}

.btn{
  margin-top:8px;
  background:#25D366;
  color:white;
  padding:8px;
  border-radius:8px;
}

/* Floating Button */
.floating{
  position:fixed;
  bottom:20px;
  right:15px;
  background:#25D366;
  color:white;
  padding:12px 15px;
  border-radius:25px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🔥 CSC Digital Service Portal 🔥</header>

<div class="search">
<input type="text" placeholder="Search service...">
</div>

<!-- TOP ADS -->
<div class="ad-box">
👉 यहाँ Google AdSense Ad आएगा
</div>

<div class="grid">

<!-- AADHAR -->
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Aadhaar_Logo.svg/512px-Aadhaar_Logo.svg.png">
<a href="https://uidai.gov.in">Aadhar Service</a>
<div class="btn">Apply Now</div>
</div>

<!-- PM KISAN -->
<div class="card">
<img src="https://pmkisan.gov.in/Images/pmkisan-logo.png">
<a href="https://pmkisan.gov.in">PM Kisan</a>
<div class="btn">Check Status</div>
</div>

<!-- E SHRAM -->
<div class="card">
<img src="https://eshram.gov.in/assets/images/logo.png">
<a href="https://eshram.gov.in">E Shram Card</a>
<div class="btn">Register</div>
</div>

<!-- JOB -->
<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<a href="https://ncs.gov.in">Job Apply</a>
<div class="btn">Apply Now</div>
</div>

<!-- SCHOLARSHIP -->
<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<a href="https://pfms.nic.in">Scholarship</a>
<div class="btn">Apply</div>
</div>

<!-- ELECTRICITY -->
<div class="card">
<img src="https://www.uppcl.org/site/writereaddata/siteContent/images/logo.png">
<a href="https://www.uppcl.org">Electricity Bill</a>
<div class="btn">Pay Bill</div>
</div>

</div>

<!-- MIDDLE ADS -->
<div class="ad-box">
👉 यहाँ दूसरा Ad लगेगा
</div>

<!-- WHATSAPP BUTTON -->
<a class="floating" href="https://wa.me/917467002020">
💬 Apply via WhatsApp
</a>

</body>
  </html>
