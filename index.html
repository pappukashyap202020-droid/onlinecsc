<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shashi Digital CSC Portal</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}

/* HERO BANNER */
.hero{
height:100vh;
background:linear-gradient(135deg,#0d47a1,#1976d2);
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:28px;
margin-bottom:10px;
}

.hero p{
font-size:14px;
margin-bottom:20px;
}

.start-btn{
background:#ff9800;
border:none;
padding:12px 20px;
color:#fff;
font-size:16px;
border-radius:5px;
}

/* MAIN */
.header{
background:#0d47a1;color:#fff;text-align:center;padding:12px;
}

.section{
margin:8px;background:#fff;border-radius:6px;
}

.section-title{
background:#1565c0;color:#fff;padding:8px;
}

.item{
display:flex;justify-content:space-between;
padding:10px;font-size:13px;border-bottom:1px solid #eee;
}

.btn{
background:#1e88e5;color:#fff;border:none;padding:5px 10px;
border-radius:4px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Shashi Digital Services 💼</h1>
<p>यहाँ सभी सरकारी सेवाएं उपलब्ध हैं ✔️</p>
<button class="start-btn" onclick="start()">Start Now</button>
</div>

<!-- MAIN PORTAL -->
<div id="main" style="display:none;">

<div class="header">CSC Digital Portal</div>

<div class="section">
<div class="section-title">Services</div>

<div class="item">
<span>PAN Card</span>
<button class="btn" onclick="pay(50,'PAN')">₹50</button>
</div>

<div class="item">
<span>Income Certificate</span>
<button class="btn" onclick="pay(30,'Income')">₹30</button>
</div>

<div class="item">
<span>Ration Card</span>
<button class="btn" onclick="pay(20,'Ration')">₹20</button>
</div>

</div>

</div>

<script>

function start(){
document.querySelector(".hero").style.display="none";
document.getElementById("main").style.display="block";
}

function pay(amount, service){

var options = {
    "key": "YOUR_KEY_ID",
    "amount": amount * 100,
    "currency": "INR",
    "name": "Shashi CSC",
    "description": service,

    "handler": function (){
        alert("Payment Successful ✅");
    }
};

var rzp = new Razorpay(options);
rzp.open();

}

</script>

</body>
  </html>
